services:
  backend:
    build:
      context: ./backend
    container_name: court_order_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env.example

  frontend:
    build:
      context: ./streamlit_app
    container_name: court_order_streamlit
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - API_BASE_URL=http://backend:8000
    volumes:
      - ./data:/app/data
